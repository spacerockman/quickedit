<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickEdit</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-open" onclick="openFileDialog()" title="Open file (Cmd+O)">Open</button>
    <span id="filename">Untitled</span>
    <span id="lang-label">Plain Text</span>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme (Cmd+B)">&#9788;</button>
  </div>

  <!-- Drop overlay -->
  <div id="drop-overlay" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
    <div id="drop-hint">Drop file to open</div>
  </div>

  <!-- Editor container -->
  <div id="editor"></div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="status-lines">Ln <span id="line-count">0</span></span>
    <span id="status-words">W: <span id="word-count">0</span></span>
    <span id="status-hint">Cmd+O Open &middot; Cmd+S Save &middot; Cmd+B Theme</span>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" onchange="handleFileInput(event)" style="display:none">

<!-- Bundled editor (self-contained IIFE, no module required -- works from file://) -->
<script src="editor.bundle.js"></script>

</body>
</html>
