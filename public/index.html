<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickEdit</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="atomic-preview.css">
</head>
<body>

<div id="app">
  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-open" onclick="openFileDialog()" title="Open file (Cmd+O)">Open</button>
    <button id="btn-save" onclick="saveFile()" title="Save file">Save</button>
    <button id="btn-close" onclick="closeFile()" title="Close file (Cmd+W)">Close</button>
    <button id="btn-preview" onclick="togglePreview()" title="Toggle Markdown preview (Cmd+Shift+P)">Preview</button>
    <span id="md-badge" onclick="toggleWysiwyg()" title="WYSIWYG mode active — click to exit (Cmd+Shift+M)">MD</span>
    <span id="filename">Untitled</span>
    <span id="lang-label">Plain Text</span>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme (Cmd+B)">&#9788;</button>
  </div>

  <!-- Drop overlay -->
  <div id="drop-overlay">
    <div id="drop-hint">Drop file to open</div>
  </div>

  <!-- Editor + Preview -->
  <div id="content">
    <div id="editor"></div>
    <div id="preview"></div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="cursor-pos">Ln 1, Col 1</span>
    <span id="status-lines">Lines: <span id="line-count">0</span></span>
    <span id="status-words">Words: <span id="word-count">0</span></span>
    <span id="autosave-status">Autosave on</span>
    <span id="status-hint">Cmd+O Open &middot; Cmd+W Close &middot; Cmd+Shift+P Preview &middot; Cmd+B Theme &middot; @md for WYSIWYG</span>
    <label id="language-picker-wrap" title="Syntax highlighting language">
      <span>Lang</span>
      <select id="language-picker" aria-label="Syntax highlighting language"></select>
    </label>
  </div>
</div>

<!-- Hidden file input (legacy fallback for browsers without showOpenFilePicker) -->
<input type="file" id="file-input" onchange="handleFileInput(event)" hidden>

<!-- Bundled editor (self-contained IIFE, no module required -- works from file://) -->
<script src="editor.bundle.js"></script>

</body>
</html>
